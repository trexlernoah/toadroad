<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toad Road</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/jpeg" href="public/twotracksicon.jpg" />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        overflow-x: hidden;
      }

      .hero {
        width: 100vw;
        min-height: 100vh;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .hero img {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        display: block;
        z-index: 0;
      }

      .player {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: min(350px, calc(100vw - 32px));
        padding: 16px 0;
      }

      .player iframe {
        width: 100%;
        height: 470px;
        border: 0;
      }

      .social-links {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 12px;
        width: 100%;
      }

      .social-links a {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        padding: 11px 0;
        border-radius: 999px;
        border: 2.5px solid transparent;
        text-decoration: none;
        font-family: "Dancing Script", cursive;
        font-size: 18px;
        font-weight: 700;
        background: rgba(255, 255, 255, 0.75);
        -webkit-text-stroke: 0.5px #000;
        color: #000;
        transition: background 0.2s;
      }

      .social-links a:hover {
        background: rgba(255, 255, 255, 0.92);
      }

      .social-links a.youtube {
        border-color: #ff0000;
      }
      .social-links a.spotify {
        border-color: #1db954;
      }

      .social-links a.instagram {
        border-color: #d6249f;
      }

      .social-links svg {
        width: 20px;
        height: 20px;
        flex-shrink: 0;
      }

      .social-links a.youtube svg {
        fill: #ff0000;
      }
      .social-links a.spotify svg {
        fill: #1db954;
      }
      .social-links a.instagram svg {
        fill: #d6249f;
      }
    </style>
  </head>
