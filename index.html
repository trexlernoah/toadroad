<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toad Road</title>
    <link rel="icon" type="image/jpeg" href="public/twotracksicon.jpg" />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        overflow-x: hidden;
      }

      .hero {
        width: 100vw;
        min-height: 100vh;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .hero img {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        display: block;
        z-index: 0;
      }

      .player {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: min(350px, calc(100vw - 32px));
        padding: 16px 0;
      }

      .player iframe {
        width: 100%;
        height: 470px;
        border: 0;
      }

      .social-links {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 12px;
        width: 100%;
      }

      .social-links a {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        padding: 11px 0;
        border-radius: 999px;
        text-decoration: none;
        font-family: sans-serif;
        font-size: 15px;
        font-weight: 600;
        color: #fff;
        transition: opacity 0.2s;
      }

      .social-links a:hover {
        opacity: 0.85;
      }

      .social-links a.youtube {
        background: #ff0000;
      }
      .social-links a.spotify {
        background: #1db954;
      }
      .social-links a.instagram {
        background: radial-gradient(
          circle at 30% 107%,
          #fdf497 0%,
          #fd5949 45%,
          #d6249f 60%,
          #285aeb 90%
        );
      }

      .social-links svg {
        width: 20px;
        height: 20px;
        fill: #fff;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <section class="hero">
      <img src="public/toadrd.jpg" alt="Background" />
      <div class="player">
        <iframe
          style="border: 0; width: 350px; height: 470px"
          src="https://bandcamp.com/EmbeddedPlayer/album=3231671411/size=large/bgcol=ffffff/linkcol=0687f5/tracklist=false/transparent=true/"
          seamless
          ><a href="https://toadroad.bandcamp.com/album/two-tracks"
            >Two Tracks by Toad Road</a
          ></iframe
        >
        <div class="social-links">

      </div>
    </section>
